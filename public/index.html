<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#262b30"/>
  <title>Renata — Vargas &amp; Zúñiga Abogados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --marengo: #262b30;
      --marengo-light: #2e343a;
      --celeste: #0d9dcd;
      --celeste-dark: #0a7aa3;
      --white: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; -webkit-font-smoothing: antialiased; }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      font-family: "Inter", -apple-system, sans-serif;
      background: var(--marengo);
    }

    /* ── HEADER ── */
    #header {
      flex-shrink: 0; z-index: 10; position: relative;
      background: var(--marengo);
      border-bottom: 1px solid rgba(13,157,205,0.25);
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px;
    }

    #avatar {
      width: 40px; height: 40px; flex-shrink: 0;
      border: 1px solid rgba(13,157,205,0.4);
      overflow: hidden;
      background: var(--marengo-light);
      display: flex; align-items: center; justify-content: center;
    }
    #avatar img { width: 78%; height: 78%; object-fit: contain; }

    #header-info { flex: 1; min-width: 0; }
    #bot-name {
      font-family: "Inter", sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--white); letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #bot-subtitle {
      font-size: 10px; color: rgba(255,255,255,0.65);
      letter-spacing: 0.05em; margin-top: 1px;
    }
    #bot-status { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
    .pulse-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #7ab07a; flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #status-text { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; }

    #brand-block { text-align: right; flex-shrink: 0; }
    #brand-monogram {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: var(--marengo-light); border: 1px solid rgba(13,157,205,0.4);
      padding: 4px;
    }
    #brand-monogram img { width: 100%; height: 100%; object-fit: contain; }
    #brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,0.85); letter-spacing: 0.12em;
      text-transform: uppercase; margin-top: 2px;
      white-space: nowrap;
    }

    /* ── MENSAJES ── */
    #messages {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; z-index: 1;
      background: var(--marengo);
    }

    .row { display: flex; width: 100%; }
    .row.user { justify-content: flex-end; }
    .row.bot  { justify-content: flex-start; align-items: flex-end; gap: 8px; }

    .msg-avatar {
      width: 22px; height: 22px; flex-shrink: 0;
      border: 1px solid rgba(13,157,205,0.35);
      overflow: hidden; margin-bottom: 2px;
      background: var(--marengo-light);
      display: flex; align-items: center; justify-content: center;
    }
    .msg-avatar img { width: 75%; height: 75%; object-fit: contain; }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
    .row.user .bubble-wrap { align-items: flex-end; }
    .row.bot  .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      font-size: 14px; line-height: 1.55;
      word-break: break-word; white-space: pre-wrap;
      animation: fadeUp 0.22s ease;
      border-radius: 0;
      position: relative;
      color: var(--white);
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .bubble.bot {
      background: var(--celeste);
    }
    .bubble.bot::after {
      content: "";
      position: absolute;
      bottom: -7px; left: 12px;
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid var(--celeste);
    }
    .bubble.bot strong { color: var(--white); font-weight: 700; }

    .bubble.user {
      background: var(--celeste-dark);
    }
    .bubble.user::after {
      content: "";
      position: absolute;
      bottom: -7px; right: 12px;
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid var(--celeste-dark);
    }

    .msg-time {
      font-size: 9px; color: rgba(255,255,255,0.3);
      margin-top: 4px; padding: 0 3px;
      letter-spacing: 0.04em;
    }

    .typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 11px 15px;
      background: var(--celeste);
      border-radius: 0;
      animation: fadeUp 0.2s ease;
    }
    .typing-bubble span {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2){animation-delay:.2s}
    .typing-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* ── BRANDING ── */
    #branding {
      flex-shrink: 0; text-align: center;
      font-size: 9px; color: rgba(255,255,255,0.25);
      padding: 3px 0 4px; z-index: 1; position: relative;
      letter-spacing: 0.06em; text-transform: uppercase;
      background: var(--marengo);
    }
    #branding a { color: rgba(13,157,205,0.8); text-decoration: none; }

    /* ── INPUT ── */
    #input-area {
      flex-shrink: 0; z-index: 10; position: relative;
      background: var(--marengo);
      border-top: 1px solid rgba(13,157,205,0.2);
      padding: 10px 14px 18px;
    }
    #input-row { display: flex; gap: 10px; align-items: flex-end; }

    #msg-input {
      flex: 1; min-width: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(13,157,205,0.3);
      padding: 10px 14px;
      color: var(--white);
      font-size: 16px; font-family: "Inter", sans-serif;
      outline: none; resize: none;
      line-height: 1.4; max-height: 100px; overflow-y: auto;
      -webkit-appearance: none; transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--celeste); }
    #msg-input::placeholder { color: rgba(255,255,255,0.35); font-size: 14px; }

    #send-btn {
      flex-shrink: 0; width: 40px; height: 40px;
      background: var(--celeste);
      border: 1px solid var(--celeste);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-bottom: 1px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #send-btn:active:not(:disabled) { background: var(--celeste-dark); }
    #send-btn:disabled { opacity: 0.35; }
    #send-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">
      <img src="/vz-logo-navbar.png" alt="Vargas y Zúñiga"/>
    </div>
    <div id="header-info">
      <div id="bot-name">Renata</div>
      <div id="bot-subtitle">Secretaria Virtual</div>
      <div id="bot-status">
        <div class="pulse-dot"></div>
        <span id="status-text">En l&iacute;nea</span>
      </div>
    </div>
    <div id="brand-block">
      <div id="brand-monogram"><img src="/vz-logo-navbar.png" alt="VZ"/></div>
      <div id="brand-name">Vargas &amp; Z&uacute;&ntilde;iga</div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="branding">Powered by <a href="https://acbothub.com" target="_blank">ACBotHub</a></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" rows="1"
        placeholder="Escribe tu mensaje..."
        autocomplete="on" autocorrect="on"
        autocapitalize="sentences" spellcheck="true"
        enterkeyhint="send"></textarea>
      <button id="send-btn" disabled aria-label="Enviar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="#ffffff" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  var WELCOME = "Bienvenido a Vargas y Z\u00fa\u00f1iga Abogados. Soy Renata, secretaria del estudio. \u00bfEn qu\u00e9 puedo ayudarle?";
  var sessionId = "web-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);

  var busy = false;
  var msgsEl  = document.getElementById("messages");
  var input   = document.getElementById("msg-input");
  var sendBtn = document.getElementById("send-btn");
  var app     = document.getElementById("app");

  if(window.visualViewport){
    function adjust(){
      var vv=window.visualViewport;
      var gap=window.innerHeight-vv.offsetTop-vv.height;
      app.style.bottom=Math.max(0,gap)+"px";
      msgsEl.scrollTop=msgsEl.scrollHeight;
    }
    window.visualViewport.addEventListener("resize",adjust);
    window.visualViewport.addEventListener("scroll",adjust);
  }

  input.addEventListener("input",function(){
    this.style.height="auto";
    this.style.height=Math.min(this.scrollHeight,100)+"px";
    sendBtn.disabled=!this.value.trim();
  });

  function ts(){
    var n=new Date();
    return n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
  }

  function esc(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function parseText(text){
    var parts=[],re=/\[([^\]]+)\]\((https?:\/\/[^)]+)\)|(https?:\/\/[^\s]+)/g;
    var last=0,m;
    re.lastIndex=0;
    while((m=re.exec(text))!==null){
      parts.push(fmt(text.slice(last,m.index)));
      if(m[1]&&m[2]){
        parts.push("<a href=\""+m[2]+"\" target=\"_blank\" style=\"color:#ffffff;text-decoration:underline;font-weight:600\">"+esc(m[1])+" &#8599;</a>");
      }else{
        parts.push("<a href=\""+m[3]+"\" target=\"_blank\" style=\"color:#ffffff;text-decoration:underline;word-break:break-all;font-size:13px\">"+esc(m[3])+"</a>");
      }
      last=m.index+m[0].length;
    }
    parts.push(fmt(text.slice(last)));
    return parts.join("");
  }

  function fmt(t){
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/\*([^*]+)\*/g,"<em>$1</em>")
      .replace(/\n/g,"<br>");
  }

  function miniAvatar(){
    return "<div class=\"msg-avatar\"><img src=\"/vz-logo-navbar.png\" alt=\"VZ\"/></div>";
  }

  function addMsg(role,text){
    var row=document.createElement("div"); row.className="row "+role;
    var wrap=document.createElement("div"); wrap.className="bubble-wrap";
    var b=document.createElement("div"); b.className="bubble "+role;
    if(role==="bot"){b.innerHTML=parseText(text);}else{b.textContent=text;}
    var t=document.createElement("div"); t.className="msg-time"; t.textContent=ts();
    wrap.appendChild(b); wrap.appendChild(t);
    if(role==="bot"){row.innerHTML=miniAvatar(); row.appendChild(wrap);}
    else{row.appendChild(wrap);}
    msgsEl.appendChild(row);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  function showTyping(){
    var row=document.createElement("div");
    row.className="row bot typing-row"; row.id="typing";
    row.innerHTML=miniAvatar();
    var tb=document.createElement("div"); tb.className="typing-bubble";
    tb.innerHTML="<span></span><span></span><span></span>";
    row.appendChild(tb); msgsEl.appendChild(row);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  function hideTyping(){var el=document.getElementById("typing");if(el)el.remove();}

  async function send(){
    var text=input.value.trim();
    if(!text||busy)return;
    input.value=""; input.style.height="auto"; input.blur();
    sendBtn.disabled=true;
    addMsg("user",text);
    busy=true; showTyping();
    try{
      var r=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({sessionId:sessionId,message:text})
      });
      var d=await r.json();
      hideTyping();
      addMsg("bot",d.reply||"Disculpe, no pude generar una respuesta. Intente nuevamente.");
    }catch(e){
      hideTyping();
      addMsg("bot","Disculpe, tuvimos un problema t\u00e9cnico. Por favor intente de nuevo.");
    }
    busy=false; sendBtn.disabled=!input.value.trim();
  }

  sendBtn.addEventListener("click",send);
  input.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
  });

  // Mensaje de bienvenida
  var wr=document.createElement("div"); wr.className="row bot";
  var ww=document.createElement("div"); ww.className="bubble-wrap";
  var wb=document.createElement("div"); wb.className="bubble bot";
  wb.innerHTML=parseText(WELCOME);
  var wt=document.createElement("div"); wt.className="msg-time"; wt.textContent=ts();
  ww.appendChild(wb); ww.appendChild(wt);
  wr.innerHTML=miniAvatar(); wr.appendChild(ww);
  msgsEl.appendChild(wr);
  sendBtn.disabled=true;
})();
</script>
</body>
</html>
