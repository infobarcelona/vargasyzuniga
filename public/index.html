<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Kit Legal — Prueba interna</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 30px auto; display: flex; gap: 24px; }
  #chat-col { flex: 1.4; }
  #debug-col { flex: 1; background: #f5f5f7; border-radius: 8px; padding: 16px; font-size: 13px; }
  #messages { border: 1px solid #ddd; border-radius: 8px; height: 480px; overflow-y: auto; padding: 12px; margin-bottom: 12px; }
  .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
  .user { background: #4F46E5; color: white; margin-left: auto; text-align: right; }
  .bot { background: #e9e9ec; }
  #input-row { display: flex; gap: 8px; }
  #input-row input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
  #input-row button { padding: 10px 16px; border: none; background: #4F46E5; color: white; border-radius: 6px; cursor: pointer; }
  pre { white-space: pre-wrap; word-break: break-word; }
  .score-bar { height: 10px; border-radius: 5px; background: #ddd; overflow: hidden; margin: 6px 0; }
  .score-fill { height: 100%; background: #ef4444; transition: width .3s; }
  h3 { margin-top: 0; }
</style>
</head>
<body>
  <div id="chat-col">
    <h3>Kit Legal — Vargas y Zúñiga (prueba interna, NO conectado a WhatsApp)</h3>
    <div id="messages"></div>
    <div id="input-row">
      <input id="input" placeholder="Escribe como si fueras el cliente..." />
      <button onclick="enviar()">Enviar</button>
    </div>
  </div>
  <div id="debug-col">
    <h3>🔧 Panel de debug</h3>
    <div>Score actual: <strong id="score">0</strong>/100</div>
    <div class="score-bar"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
    <div id="clasificacion"></div>
    <div id="cita-status" style="margin-top:10px;"></div>
    <pre id="leaddata"></pre>
  </div>

<script>
  const sessionId = 'test-' + Math.random().toString(36).slice(2);
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');

  function addMessage(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function enviar() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    inputEl.value = '';

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message: text })
    });
    const data = await res.json();

    if (data.error) {
      addMessage('⚠️ Error: ' + data.error, 'bot');
      return;
    }

    addMessage(data.reply, 'bot');

    document.getElementById('score').textContent = data.debug.score;
    document.getElementById('score-fill').style.width = data.debug.score + '%';
    document.getElementById('score-fill').style.background =
      data.debug.score >= data.debug.umbral ? '#22c55e' : (data.debug.score >= 40 ? '#f59e0b' : '#ef4444');
    document.getElementById('clasificacion').textContent = data.debug.clasificacion + ' (umbral: ' + data.debug.umbral + ')';
    document.getElementById('cita-status').innerHTML = data.debug.citaAgendada
      ? '✅ <strong>CITA AGENDADA</strong>'
      : '⏳ Cita no agendada todavía';
    document.getElementById('leaddata').textContent = JSON.stringify(data.debug, null, 2);
  }

  inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') enviar(); });
</script>
</body>
</html>
