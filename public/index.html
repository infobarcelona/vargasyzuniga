<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>Renata — Vargas &amp; Zúñiga Abogados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --marengo: #ffffff;
      --marengo-light: #f1edeb;
      --celeste: #ffffff;
      --celeste-dark: #2b65c0;
      --white: #1d1d1b;
      --accent: #1746a0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; -webkit-font-smoothing: antialiased; }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      font-family: "Inter", -apple-system, sans-serif;
      background: var(--marengo);
    }

    /* ── HEADER ── */
    #header {
      flex-shrink: 0; z-index: 10; position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      background: #1d1d1b;
      border-bottom: 1px solid rgba(23,70,160,0.25);
      display: flex; align-items: center; gap: 14px;
      padding: 16px;
    }

    #avatar {
      width: 80px; height: 80px; flex-shrink: 0;
      border: 2px solid rgba(23,70,160,0.3);
      border-radius: 50%;
      overflow: hidden;
      background: var(--marengo-light);
      display: flex; align-items: center; justify-content: center;
    }
    #avatar img { width: 100%; height: 100%; object-fit: cover; }

    #header-info { flex: 1; min-width: 0; }
    #bot-name {
      font-family: "Inter", sans-serif;
      font-size: 12px; font-weight: 500;
      color: #ffffff; letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #bot-subtitle {
      font-size: 10px; color: rgba(255,255,255,0.65);
      letter-spacing: 0.05em; margin-top: 1px;
    }
    #bot-status { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
    .pulse-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #7ab07a; flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #status-text { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; text-transform: uppercase; }

    #brand-block { text-align: right; flex-shrink: 0; margin-top: 18px; }
    #brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,0.85); letter-spacing: 0.12em;
      text-transform: uppercase; margin-top: 2px;
      white-space: nowrap;
    }

    /* ── MENSAJES ── */
    #messages {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; z-index: 1;
      background: var(--marengo);
    }

    .row { display: flex; width: 100%; }
    .row.user { justify-content: flex-end; }
    .row.bot  { justify-content: flex-start; align-items: flex-end; gap: 8px; }

    .msg-avatar {
      width: 36px; height: 36px; flex-shrink: 0;
      border: 1px solid rgba(23,70,160,0.25);
      border-radius: 50%;
      overflow: hidden; margin-bottom: 2px;
      background: var(--marengo-light);
      display: flex; align-items: center; justify-content: center;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
    .row.user .bubble-wrap { align-items: flex-end; }
    .row.bot  .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      font-size: 14px; line-height: 1.55;
      word-break: break-word; white-space: pre-wrap;
      animation: fadeUp 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border-radius: 16px;
      border: 1px solid rgba(23,70,160,0.12);
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      color: #363636;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    .bubble.bot {
      background: var(--celeste);
    }
    .bubble.bot strong { color: #8492a6; font-weight: 700; }
    .bubble.bot em { color: #8492a6; font-style: normal; }

    .bubble.user {
      background: var(--celeste-dark);
      color: #ffffff !important;
    }

    .msg-time {
      font-size: 9px; color: rgba(29,29,27,0.4);
      margin-top: 4px; padding: 0 3px;
      letter-spacing: 0.04em;
    }

    .typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 11px 15px;
      background: transparent;
      animation: fadeUp 0.2s ease;
    }
    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #1746a0;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2){animation-delay:.2s}
    .typing-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* ── BRANDING ── */
    #branding {
      flex-shrink: 0; text-align: center;
      font-size: 9px; color: rgba(29,29,27,0.35);
      padding: 3px 0 4px; z-index: 1; position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      letter-spacing: 0.06em; text-transform: uppercase;
      background: var(--marengo);
    }
    #branding a { color: rgba(23,70,160,0.85); text-decoration: none; }

    /* ── INPUT ── */
    #input-area {
      flex-shrink: 0; z-index: 10; position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      background: var(--marengo);
      border-top: 1px solid rgba(23,70,160,0.2);
      padding: 10px 14px 18px;
    }
    #input-row { display: flex; gap: 10px; align-items: flex-end; }

    #msg-input {
      flex: 1; min-width: 0;
      background: var(--marengo-light);
      border: 1px solid rgba(23,70,160,0.25);
      border-radius: 14px;
      padding: 10px 14px;
      color: var(--white);
      font-size: 16px; font-family: "Inter", sans-serif;
      outline: none; resize: none;
      line-height: 1.4; max-height: 100px; overflow-y: hidden;
      -webkit-appearance: none; transition: border-color 0.2s;
    }
    #msg-input.scrollable { overflow-y: auto; }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: rgba(29,29,27,0.4); font-size: 14px; }

    #send-btn {
      flex-shrink: 0; width: 40px; height: 40px;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-bottom: 1px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #send-btn:active:not(:disabled) { background: #123a82; }
    #send-btn:disabled { opacity: 0.35; }
    #send-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">
      <img src="/renata-avatar.png" alt="Renata"/>
    </div>
    <div id="header-info">
      <div id="bot-name">Renata</div>
      <div id="bot-subtitle">Secretaria Virtual</div>
      <div id="bot-status">
        <div class="pulse-dot"></div>
        <span id="status-text">En l&iacute;nea</span>
      </div>
    </div>
    <div id="brand-block">
      <div id="brand-name">Vargas <span style="color:#1746a0">&amp;</span> Z&uacute;&ntilde;iga</div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="branding">Powered by <a href="https://acbothub.com" target="_blank">ACBotHub</a></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" rows="1"
        placeholder="Escribe tu mensaje..."
        autocomplete="on" autocorrect="on"
        autocapitalize="sentences" spellcheck="true"
        enterkeyhint="send"></textarea>
      <button id="send-btn" disabled aria-label="Enviar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="#ffffff" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  var WELCOME = "Bienvenido a Vargas y Z\u00fa\u00f1iga Abogados. Soy Renata, secretaria del estudio. \u00bfEn qu\u00e9 puedo ayudarle?";
  var sessionId = "web-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);
  var portalToken = null;
  var archivoActivo = null;
  var saludoYaAplicado = false;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'VYZ_PORTAL_TOKEN') {
      if (e.data.token) portalToken = e.data.token;
      // Solo actualizar archivoActivo si viene definido en este mensaje
      if (e.data.archivoActivo !== undefined) archivoActivo = e.data.archivoActivo;
      // Personalizar bienvenida solo una vez, y solo si llega el nombre
      if (e.data.nombre && !saludoYaAplicado) {
        saludoYaAplicado = true;
        var primerNombre = e.data.nombre.split(' ')[0];
        // Hora actual en Chile
        var horaChile = parseInt(new Intl.DateTimeFormat('en-US', { timeZone: 'America/Santiago', hour: 'numeric', hour12: false }).format(new Date()), 10);
        var saludo;
        if (horaChile >= 6 && horaChile < 12) saludo = 'Buenos días';
        else if (horaChile >= 12 && horaChile < 20) saludo = 'Buenas tardes';
        else saludo = 'Buenas noches';
        var saludoPortal = 'Hola ' + primerNombre + ', ' + saludo.toLowerCase() + '. ¿En qué puedo ayudarte?';
        WELCOME = saludoPortal;
        // Reemplazar el bubble de bienvenida, reintentando si aun no existe
        var aplicarSaludo = function(intentos) {
          var welcomeEl = document.getElementById('vyz-welcome-bubble');
          if (welcomeEl) {
            welcomeEl.innerHTML = parseText(saludoPortal);
          } else if (intentos > 0) {
            setTimeout(function() { aplicarSaludo(intentos - 1); }, 200);
          }
        };
        aplicarSaludo(15);
      }
    }
  });

  var busy = false;
  var msgsEl  = document.getElementById("messages");
  var input   = document.getElementById("msg-input");
  var sendBtn = document.getElementById("send-btn");
  var app     = document.getElementById("app");

  if(window.visualViewport){
    function adjust(){
      var vv=window.visualViewport;
      var gap=window.innerHeight-vv.offsetTop-vv.height;
      app.style.bottom=Math.max(0,gap)+"px";
      msgsEl.scrollTop=msgsEl.scrollHeight;
    }
    window.visualViewport.addEventListener("resize",adjust);
    window.visualViewport.addEventListener("scroll",adjust);
  }

  input.addEventListener("input",function(){
    this.style.height="auto";
    var needsScroll = this.scrollHeight > 100;
    this.style.height=Math.min(this.scrollHeight,100)+"px";
    this.classList.toggle("scrollable", needsScroll);
    sendBtn.disabled=!this.value.trim();
  });

  function ts(){
    var n=new Date();
    return n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
  }

  function esc(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function parseText(text){
    var parts=[],re=/\[([^\]]+)\]\((https?:\/\/[^)]+)\)|(https?:\/\/[^\s]+)/g;
    var last=0,m;
    re.lastIndex=0;
    while((m=re.exec(text))!==null){
      parts.push(fmt(text.slice(last,m.index)));
      if(m[1]&&m[2]){
        parts.push("<a href=\""+m[2]+"\" target=\"_blank\" style=\"color:#ffffff;text-decoration:underline;font-weight:600\">"+esc(m[1])+" &#8599;</a>");
      }else{
        parts.push("<a href=\""+m[3]+"\" target=\"_blank\" style=\"color:#ffffff;text-decoration:underline;word-break:break-all;font-size:13px\">"+esc(m[3])+"</a>");
      }
      last=m.index+m[0].length;
    }
    parts.push(fmt(text.slice(last)));
    return parts.join("");
  }

  function fmt(t){
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/\*([^*]+)\*/g,"<em>$1</em>")
      .replace(/\n/g,"<br>");
  }

  function miniAvatar(){
    return "<div class=\"msg-avatar\"><img src=\"/renata-avatar.png\" alt=\"Renata\"/></div>";
  }

  function addMsg(role,text){
    var row=document.createElement("div"); row.className="row "+role;
    var wrap=document.createElement("div"); wrap.className="bubble-wrap";
    var b=document.createElement("div"); b.className="bubble "+role;
    if(role==="bot"){b.innerHTML=parseText(text);}else{b.textContent=text;}
    var t=document.createElement("div"); t.className="msg-time"; t.textContent=ts();
    wrap.appendChild(b); wrap.appendChild(t);
    if(role==="bot"){row.innerHTML=miniAvatar(); row.appendChild(wrap);}
    else{row.appendChild(wrap);}
    msgsEl.appendChild(row);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  function showTyping(){
    var row=document.createElement("div");
    row.className="row bot typing-row"; row.id="typing";
    row.innerHTML=miniAvatar();
    var tb=document.createElement("div"); tb.className="typing-bubble";
    tb.innerHTML="<span></span><span></span><span></span>";
    row.appendChild(tb); msgsEl.appendChild(row);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  function hideTyping(){var el=document.getElementById("typing");if(el)el.remove();}

  function isMobile(){
    // OJO: no medimos el ancho de ventana, porque este chat vive dentro
    // de un iframe angosto (380px) cuando esta embebido como widget, lo
    // que haria pensar que SIEMPRE es movil incluso en un computador de
    // escritorio. En vez de eso, detectamos si el dispositivo usa touch
    // como mecanismo principal de entrada (eso si distingue celular de
    // computador, sin importar que tan angosto sea el contenedor).
    return window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
  }

  async function send(){
    var text=input.value.trim();
    if(!text||busy)return;
    input.value=""; input.style.height="auto";
    // En movil cerramos el teclado al enviar (asi se ve mas de la
    // conversacion). En escritorio NO quitamos el foco: el cursor debe
    // quedar listo para seguir escribiendo sin tener que hacer clic de nuevo.
    if(isMobile()){ input.blur(); }
    sendBtn.disabled=true;
    addMsg("user",text);
    busy=true; showTyping();
    try{
      var chatUrl="/api/chat";
      var r=await fetch(chatUrl,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({sessionId:sessionId,message:text,portalToken:portalToken||undefined,archivoActivo:archivoActivo||undefined})
      });
      var d=await r.json();
      hideTyping();
      addMsg("bot",d.reply||"Disculpe, no pude generar una respuesta. Intente nuevamente.");
    }catch(e){
      hideTyping();
      addMsg("bot","Disculpe, tuvimos un problema t\u00e9cnico. Por favor intente de nuevo.");
    }
    busy=false; sendBtn.disabled=!input.value.trim();
    // En escritorio devolvemos el foco al input apenas el bot responde,
    // para que el cursor quede parpadeando listo para el siguiente mensaje.
    if(!isMobile()){ input.focus(); }
  }

  sendBtn.addEventListener("click",send);
  input.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
  });

  // Mensaje de bienvenida
  var wr=document.createElement("div"); wr.className="row bot";
  var ww=document.createElement("div"); ww.className="bubble-wrap";
  var wb=document.createElement("div"); wb.className="bubble bot"; wb.id="vyz-welcome-bubble";
  var wt=document.createElement("div"); wt.className="msg-time"; wt.textContent=ts();
  ww.appendChild(wb); ww.appendChild(wt);
  wr.innerHTML=miniAvatar(); wr.appendChild(ww);
  msgsEl.appendChild(wr);
  // Detectar si estamos en el portal (dentro de un iframe). Si es asi,
  // esperar brevemente a que llegue el saludo personalizado antes de
  // pintar el mensaje de bienvenida, para no mostrar el generico.
  var estaEnIframe = (window.self !== window.top);
  if (estaEnIframe) {
    wb.innerHTML = parseText('...');
    var pintarBienvenida = function(intentos) {
      if (saludoYaAplicado || intentos <= 0) {
        wb.innerHTML = parseText(WELCOME);
      } else {
        setTimeout(function(){ pintarBienvenida(intentos - 1); }, 150);
      }
    };
    pintarBienvenida(20);
  } else {
    wb.innerHTML = parseText(WELCOME);
  }
  sendBtn.disabled=true;
})();
</script>
</body>
</html>
