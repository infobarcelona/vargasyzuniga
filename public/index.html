    /* ── HEADER ── */
    #header {
      flex-shrink: 0; z-index: 10; position: relative;
      background: rgba(10,15,20,0.88);
      border-bottom: 1px solid rgba(180,160,110,0.25);
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px;
    }

    #avatar {
      width: 40px; height: 40px; flex-shrink: 0;
      border: 1px solid rgba(180,160,110,0.4);
      overflow: hidden;
    }
    #avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center 70%; }
    #avatar-fallback {
      width: 100%; height: 100%;
      background: #1e2d38;
      display: flex; align-items: center; justify-content: center;
      font-family: "Cormorant Garamond", serif;
      font-size: 15px; font-weight: 600; color: #c9a96e; letter-spacing: 0.05em;
    }

    #header-info { flex: 1; min-width: 0; }
    #bot-name {
      font-family: "Inter", sans-serif;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.9); letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #bot-subtitle {
      font-size: 10px; color: rgba(180,160,110,0.8);
      letter-spacing: 0.05em; margin-top: 1px;
    }
    #bot-status { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
    .pulse-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #7ab07a; flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #status-text { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; text-transform: uppercase; }

    #brand-block { text-align: right; flex-shrink: 0; }
    #brand-monogram {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: #1e2d38; border: 1px solid rgba(180,160,110,0.4);
      font-family: "Cormorant Garamond", serif;
      font-size: 13px; font-weight: 600; color: #c9a96e;
      letter-spacing: 0.02em;
    }
    #brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 11px; font-weight: 400;
      color: rgba(201,169,110,0.85); letter-spacing: 0.12em;
      text-transform: uppercase; margin-top: 2px;
      white-space: nowrap;
    }

    /* ── MENSAJES ── */
    #messages {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; z-index: 1;
    }

    .row { display: flex; width: 100%; }
    .row.user { justify-content: flex-end; }
    .row.bot  { justify-content: flex-start; align-items: flex-end; gap: 8px; }

    .msg-avatar {
      width: 22px; height: 22px; flex-shrink: 0;
      border: 1px solid rgba(180,160,110,0.3);
      overflow: hidden; margin-bottom: 2px;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center 70%; }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
    .row.user .bubble-wrap { align-items: flex-end; }
    .row.bot  .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      font-size: 14px; line-height: 1.55;
      word-break: break-word; white-space: pre-wrap;
      animation: fadeUp 0.22s ease;
      border-radius: 16px;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .bubble.bot {
      background: rgba(20,30,40,0.82);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(180,160,110,0.2);
      border-bottom-left-radius: 3px;
    }
    .bubble.bot strong { color: #c9a96e; font-weight: 500; }

    .bubble.user {
      background: rgba(180,160,110,0.18);
      color: rgba(255,255,255,0.88);
      border: 1px solid rgba(180,160,110,0.3);
      border-bottom-right-radius: 3px;
    }

    .msg-time {
      font-size: 9px; color: rgba(255,255,255,0.22);
      margin-top: 4px; padding: 0 3px;
      letter-spacing: 0.04em;
    }

    .typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 11px 15px;
      background: rgba(20,30,40,0.82);
      border: 1px solid rgba(180,160,110,0.2);
      border-radius: 16px; border-bottom-left-radius: 3px;
      animation: fadeUp 0.2s ease;
    }
    .typing-bubble span {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(201,169,110,0.7);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2){animation-delay:.2s}
    .typing-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    /* ── BRANDING ── */
    #branding {
      flex-shrink: 0; text-align: center;
      font-size: 9px; color: rgba(255,255,255,0.18);
      padding: 3px 0 4px; z-index: 1; position: relative;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    #branding a { color: rgba(201,169,110,0.5); text-decoration: none; }

    /* ── INPUT ── */
    #input-area {
      flex-shrink: 0; z-index: 10; position: relative;
      background: rgba(10,15,20,0.92);
      border-top: 1px solid rgba(180,160,110,0.2);
      padding: 10px 14px 18px;
    }
    #input-row { display: flex; gap: 10px; align-items: flex-end; }

    #msg-input {
      flex: 1; min-width: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180,160,110,0.25);
      padding: 10px 14px;
      color: rgba(255,255,255,0.88);
      font-size: 16px; font-family: "Inter", sans-serif;
      outline: none; resize: none;
      line-height: 1.4; max-height: 100px; overflow-y: auto;
      -webkit-appearance: none; transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: rgba(180,160,110,0.5); }
    #msg-input::placeholder { color: rgba(255,255,255,0.3); font-size: 14px; }

    #send-btn {
      flex-shrink: 0; width: 40px; height: 40px;
      background: #1e2d38;
      border: 1px solid rgba(180,160,110,0.35);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; margin-bottom: 1px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #send-btn:active:not(:disabled) { background: #2a3f50; }
    #send-btn:disabled { opacity: 0.3; }
    #send-btn svg { flex-shrink: 0; }
  </style>
</head>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" rows="1"
        placeholder="Escribe tu mensaje..."
        autocomplete="on" autocorrect="on"
        autocapitalize="sentences" spellcheck="true"
        enterkeyhint="send"></textarea>
      <button id="send-btn" disabled aria-label="Enviar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="rgba(201,169,110,0.9)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  var WELCOME = "Bienvenido a Vargas y Z\u00fa\u00f1iga Abogados. Soy Renata, secretaria del estudio. \u00bfEn qu\u00e9 puedo ayudarle?";
  var AVATAR_URL = "https://vargasyzuniga.cl/wp-content/uploads/2019/03/montana.jpg";
  var sessionId = "web-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);

  var busy = false;
  var msgsEl  = document.getElementById("messages");
  var input   = document.getElementById("msg-input");
  var sendBtn = document.getElementById("send-btn");
  var app     = document.getElementById("app");

  if(window.visualViewport){
    function adjust(){
      var vv=window.visualViewport;
      var gap=window.innerHeight-vv.offsetTop-vv.height;
      app.style.bottom=Math.max(0,gap)+"px";
      msgsEl.scrollTop=msgsEl.scrollHeight;
    }
    window.visualViewport.addEventListener("resize",adjust);
    window.visualViewport.addEventListener("scroll",adjust);
  }

  input.addEventListener("input",function(){
    this.style.height="auto";
    this.style.height=Math.min(this.scrollHeight,100)+"px";
    sendBtn.disabled=!this.value.trim();
  });

  function ts(){
    var n=new Date();
    return n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");
  }

  function esc(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function parseText(text){
    var parts=[],re=/\[([^\]]+)\]\((https?:\/\/[^)]+)\)|(https?:\/\/[^\s]+)/g;
    var last=0,m;
    re.lastIndex=0;
    while((m=re.exec(text))!==null){
      parts.push(fmt(text.slice(last,m.index)));
      if(m[1]&&m[2]){
        parts.push("<a href=\""+m[2]+"\" target=\"_blank\" style=\"color:#c9a96e;text-decoration:none;font-weight:500\">"+esc(m[1])+" &#8599;</a>");
      }else{
        parts.push("<a href=\""+m[3]+"\" target=\"_blank\" style=\"color:#c9a96e;word-break:break-all;font-size:13px\">"+esc(m[3])+"</a>");
      }
      last=m.index+m[0].length;
    }
    parts.push(fmt(text.slice(last)));
    return parts.join("");
  }

  function fmt(t){
    return esc(t)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/\*([^*]+)\*/g,"<em>$1</em>")
      .replace(/\n/g,"<br>");
  }

  function miniAvatar(){
    return "<div class=\"msg-avatar\"><img src=\""+AVATAR_URL+"\" alt=\"VZ\" onerror=\"this.parentNode.innerHTML='<div style=&quot;width:100%;height:100%;background:#1e2d38;display:flex;align-items:center;justify-content:center;font-size:10px;color:#c9a96e;font-weight:600&quot;>VZ</div>'\"/></div>";
  }

  function addMsg(role,text){
    var row=document.createElement("div"); row.className="row "+role;
    var wrap=document.createElement("div"); wrap.className="bubble-wrap";
    var b=document.createElement("div"); b.className="bubble "+role;
    if(role==="bot"){b.innerHTML=parseText(text);}else{b.textContent=text;}
    var t=document.createElement("div"); t.className="msg-time"; t.textContent=ts();
    wrap.appendChild(b); wrap.appendChild(t);
    if(role==="bot"){row.innerHTML=miniAvatar(); row.appendChild(wrap);}
    else{row.appendChild(wrap);}
    msgsEl.appendChild(row);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  function showTyping(){
    var row=document.createElement("div");
    row.className="row bot typing-row"; row.id="typing";
    row.innerHTML=miniAvatar();
    var tb=document.createElement("div"); tb.className="typing-bubble";
    tb.innerHTML="<span></span><span></span><span></span>";
    row.appendChild(tb); msgsEl.appendChild(row);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  function hideTyping(){var el=document.getElementById("typing");if(el)el.remove();}

  async function send(){
    var text=input.value.trim();
    if(!text||busy)return;
    input.value=""; input.style.height="auto"; input.blur();
    sendBtn.disabled=true;
    addMsg("user",text);
    busy=true; showTyping();
    try{
      var r=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({sessionId:sessionId,message:text})
      });
      var d=await r.json();
      hideTyping();
      addMsg("bot",d.reply||"Disculpe, no pude generar una respuesta. Intente nuevamente.");
    }catch(e){
      hideTyping();
      addMsg("bot","Disculpe, tuvimos un problema t\u00e9cnico. Por favor intente de nuevo.");
    }
    busy=false; sendBtn.disabled=!input.value.trim();
  }

  sendBtn.addEventListener("click",send);
  input.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
  });

  // Mensaje de bienvenida
  var wr=document.createElement("div"); wr.className="row bot";
  var ww=document.createElement("div"); ww.className="bubble-wrap";
  var wb=document.createElement("div"); wb.className="bubble bot";
  wb.innerHTML=parseText(WELCOME);
  var wt=document.createElement("div"); wt.className="msg-time"; wt.textContent=ts();
  ww.appendChild(wb); ww.appendChild(wt);
  wr.innerHTML=miniAvatar(); wr.appendChild(ww);
  msgsEl.appendChild(wr);
  sendBtn.disabled=true;
})();
</script>
</body>
</html>
